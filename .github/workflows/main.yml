name: Build Theos Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Install ldid
        run: brew install ldid || true

      - name: Cache Theos SDKs
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}/sdks
          key: theos-sdks-xybp888-${{ runner.os }}

      - name: Download iOS SDK (xybp888/iOS-SDKs)
        run: |
          git clone -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs.git
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv iPhoneOS16.5.sdk $THEOS/sdks/
          cd ..
          rm -rf iOS-SDKs

      - name: Verify Preferences framework exists
        run: find $THEOS/sdks/iPhoneOS16.5.sdk -iname "*Preferences*"

      - name: Build package
        run: make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packages/*.deb
